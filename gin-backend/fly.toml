# fly.toml app configuration file generated for gin-backend on 2026-06-20T11:37:48-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gin-backend'
primary_region = 'dfw'

[build]
  [build.args]
    GO_VERSION = '1.25.0'

[env]
  PORT = '8080'
  SWAGGER_HOST = 'gin-backend.fly.dev'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
